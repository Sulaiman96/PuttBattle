; GameDefaultMap is the lobby front-end (L_Lobby): a standalone / -game / packaged launch
; lands on the lobby menu (Host / Find & Join), which is the Phase-3 multiplayer on-ramp
; (D-11). EditorStartupMap stays on V_A so the editor opens straight onto the graybox
; feel-test hole. (Supersedes the D-8 stopgap that pointed GameDefaultMap at V_A.)
EditorStartupMap=/Game/Maps/Holes/H_Test/V_A.V_A
GameDefaultMap=/Game/Maps/Core/L_Lobby.L_Lobby
ServerDefaultMap=/Game/Maps/Holes/H_Test/V_A.V_A
; Project-wide default GameMode so the D7 respawn path (APBGameMode::RespawnAtCheckpoint,
; reached from FellOutOfWorld / hazards) works on EVERY map, not only maps that set a
; World Settings GameMode override. A per-map override still wins where present.
GlobalDefaultGameMode=/Game/Match/BP_PBGameMode.BP_PBGameMode_C

