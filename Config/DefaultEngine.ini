; ----------------------------------------------------------------------------
; PuttBattle collision — object channels & ball profile (CONVENTIONS §4)
; PB_Ball  : balls. Profile PB_BallProfile ignores PB_Ball (ghost balls),
;            blocks PB_Floor + PB_Wall, overlaps triggers.
; PB_Floor : every surface a ball may roll on or rest on.
; PB_Wall  : every blocking surface a ball bounces off but never rests on.
; Level-authoring law: every static mesh in a hole is PB_Floor or PB_Wall.
; ----------------------------------------------------------------------------
[/Script/Engine.CollisionProfile]
+DefaultChannelResponses=(Channel=ECC_GameTraceChannel1,Name="PB_Ball",DefaultResponse=ECR_Block,bTraceType=False,bStaticObject=False)
+DefaultChannelResponses=(Channel=ECC_GameTraceChannel2,Name="PB_Floor",DefaultResponse=ECR_Block,bTraceType=False,bStaticObject=True)
+DefaultChannelResponses=(Channel=ECC_GameTraceChannel3,Name="PB_Wall",DefaultResponse=ECR_Block,bTraceType=False,bStaticObject=True)
+Profiles=(Name="PB_BallProfile",CollisionEnabled=QueryAndPhysics,bCanModify=True,ObjectTypeName="PB_Ball",CustomResponses=((Channel="PB_Ball",Response=ECR_Ignore),(Channel="PB_Floor",Response=ECR_Block),(Channel="PB_Wall",Response=ECR_Block),(Channel="WorldStatic",Response=ECR_Block),(Channel="WorldDynamic",Response=ECR_Overlap),(Channel="Pawn",Response=ECR_Overlap),(Channel="PhysicsBody",Response=ECR_Block),(Channel="Vehicle",Response=ECR_Block),(Channel="Destructible",Response=ECR_Block),(Channel="Visibility",Response=ECR_Block),(Channel="Camera",Response=ECR_Ignore)),HelpMessage="PuttBattle ball: ignores other balls (ghost), blocks floor/wall, overlaps triggers.")

