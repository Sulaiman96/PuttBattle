; PuttBattle GameplayTag taxonomy (CONVENTIONS §5).
; Tags are the identity keys for definitions, effects, save data, achievements.
; New content adds tags HERE, never string literals.
; Unlock.* tags are seeded per-cosmetic/achievement in plans/09 — none yet.

[/Script/GameplayTags.GameplayTagsSettings]
ImportTagsFromConfig=True
WarnOnInvalidTags=True
ClearInvalidTags=False
AllowEditorTagUnloading=True
AllowGameplayTagUnloading=False
FastReplication=False
InvalidTagCharacters="\"',"
NumBitsForContainerSize=6
NetIndexFirstBitSegment=16

