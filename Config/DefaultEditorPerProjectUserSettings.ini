[/Script/ModelContextProtocolEngine.ModelContextProtocolSettings]
; Built-in UE 5.8 "Unreal MCP" server (experimental). Auto-start the HTTP server
; (http://127.0.0.1:8000/mcp) when the editor loads so the agent can connect each session.
; Note: only one editor instance can bind port 8000 — a second PIE/editor instance
; (e.g. Phase 3 two-instance Steam test) will log a bind warning and run without MCP.
bAutoStartServer=True
ServerPortNumber=8000
ServerUrlPath=/mcp
